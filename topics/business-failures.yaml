passage_overrides:
  CU3xYnICJ0s-000167-000230:
    add_failure_mechanisms: [short_term_optimization]
    note: Ownership optimized Pizza Hut as a Pepsi sales channel rather than for long-term category strength.
  CU3xYnICJ0s-000647-000712:
    add_failure_mechanisms: [unclear_positioning]
    add_causal_roles: [mechanism]
    note: The passage explicitly describes Pizza Hut as stuck in the middle.
  CU3xYnICJ0s-000712-000780:
    add_failure_mechanisms: [path_dependence]
    note: Franchise footprint and financing choices constrained later adaptation.
  CU3xYnICJ0s-000944-001004:
    add_failure_mechanisms: [short_term_optimization]
    note: The narrator contrasts private-equity hold periods with long-term restaurant stewardship.
  KhoAf9K9JC8-000240-000289:
    add_failure_mechanisms: [short_term_optimization, stakeholder_betrayal]
    note: The two-tier wage decision traded long-term labor trust for near-term savings.
  KhoAf9K9JC8-000855-000924:
    add_failure_mechanisms: [unclear_positioning]
    note: The passage describes American caught between premium and low-cost competitors.
  KhoAf9K9JC8-001113-001178:
    add_failure_mechanisms: [financial_leverage]
    note: The passage explicitly connects debt service, weak reinvestment, and customer decline.
  eX9ZC5k7XdI-000239-000299:
    add_failure_mechanisms: [mission_loss]
    note: The passage identifies failure to define a new mission after the moon landing.
  eX9ZC5k7XdI-000358-000423:
    add_failure_mechanisms: [mission_loss]
    note: The mission-accomplished trap is the central mechanism in this passage.
  eX9ZC5k7XdI-000543-000607:
    add_failure_mechanisms: [mission_loss]
    note: Institutional self-preservation replaces the external mission.
  eX9ZC5k7XdI-000669-000735:
    add_failure_mechanisms: [feedback_suppression]
    add_causal_roles: [warning_signal]
    note: Engineering warnings were overruled by management before Challenger.
  eX9ZC5k7XdI-000735-000806:
    add_failure_mechanisms: [feedback_suppression]
    note: Repeated O-ring warnings were accepted rather than acted upon.
  eX9ZC5k7XdI-001303-001380:
    add_failure_mechanisms: [incentive_misalignment]
    note: Cost-plus and fixed-price contracts create opposing incentives.
  hKZM21muITg-000249-000322:
    add_failure_mechanisms: [channel_or_platform_dependency]
    note: QVC and HSN were explicitly tied to cable distribution as that channel declined.
  MPtnA6-LDzw-000829-000898:
    add_failure_mechanisms: [channel_or_platform_dependency]
    note: The passage explicitly connects Cartoon Network's decline to cable dependence and streaming substitution.
  NfkzzB_EG5c-000479-000552:
    add_failure_mechanisms: [channel_or_platform_dependency]
    note: American Idol depended on a broadcast monoculture that fragmented with the internet.
  NfkzzB_EG5c-000676-000734:
    add_failure_mechanisms: [channel_or_platform_dependency]
    note: The passage explicitly explains the decline of media and music gatekeepers.
  e31CEPxSJaU-000845-000922:
    add_failure_mechanisms: [acquisition_or_integration_failure]
    note: Crocs' HeyDude purchase is presented as a possible repeat of its earlier diversification failure.
  guxBwYjQ_GI-000493-000551:
    add_failure_mechanisms: [acquisition_or_integration_failure]
    note: The proposed Callaway-Topgolf flywheel did not match actual customer behavior.
  guxBwYjQ_GI-000936-001009:
    add_failure_mechanisms: [acquisition_or_integration_failure]
    note: The passage ties the acquisition to a goodwill write-down and distressed sale.
  4-8_etpRj1Y-000538-000607:
    add_failure_mechanisms: [unclear_positioning]
    note: Five Guys is explicitly described as caught between affordable fast food and premium dining.
  hwFIjOsWoCs-000822-000889:
    add_failure_mechanisms: [unclear_positioning]
    note: Applebee's is explicitly described as undifferentiated and stuck in the middle.
  # v0.3 label audit (stratified sample, seed 11): egregious category errors
  # where negative mechanisms were applied to strength/rise/counterexample
  # passages, or a clearly wrong mechanism was assigned.
  eX9ZC5k7XdI-000806-000880:
    remove_failure_mechanisms: [quality_or_value_erosion]
    note: Feynman's O-ring demonstration is engineering evidence, not brand or value erosion.
  JwqbWp3738o-000692-000755:
    remove_failure_mechanisms: [incentive_misalignment]
    add_failure_mechanisms: [identity_or_reputation_coupling]
    note: The stock drop tracks the Twitter acquisition and Musk's attention, not a misaligned incentive.
  v8w6djdUt1U-001104-001166:
    remove_failure_mechanisms: [success_induced_obsolescence]
    add_failure_mechanisms: [market_or_demographic_shift]
    note: Passage contrasts international versus US revenue mix, a market shift, not self-obsolescence.
  31oqfd8myBI-001002-001073:
    remove_failure_mechanisms: [normalization_of_deviance]
    note: Competitors unbundling Craigslist's verticals is not normalization of deviance.
  dAp7D2ZX8Ik-000586-000653:
    remove_failure_mechanisms: [strategic_drift]
    note: Passage describes Panda's decisiveness and agility (a strength); Panda is a resilience counterexample.
  3cQ20dNnmDA-000162-000229:
    remove_failure_mechanisms: [normalization_of_deviance]
    note: Passage critiques the show's format artificiality, not normalization of deviance.
  MPtnA6-LDzw-000135-000201:
    remove_failure_mechanisms: [quality_or_value_erosion]
    note: Passage describes a clever advertiser-funded R&D strategy (a strength), not value erosion.
  MPtnA6-LDzw-000201-000270:
    remove_failure_mechanisms: [governance_failure]
    note: Passage describes the creative freedom that built Adult Swim (a strength), not governance failure.
  4-8_etpRj1Y-000127-000187:
    remove_failure_mechanisms: [quality_or_value_erosion]
    note: Passage describes successful early product-led marketing (a strength), not value erosion.
