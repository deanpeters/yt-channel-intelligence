    - leadership
    - owner_or_investor
    - workforce
    - customer
    - franchisee_or_partner
    - contractor_or_supplier
    - regulator_or_politician
    - competitor
  evidence_types:
    - historical_event
    - quantitative_metric
    - named_source_or_quote
    - narrator_analysis
    - comparison
    - personal_anecdote
    - sponsor_segment
  epistemic_statuses:
    - direct_source_claim
    - derived_inference
    - contested_or_unverified
    - missing_evidence

